syntax = "proto3";
package hft.order.v1;
option go_package = "github.com/anshul/hft/backend/generated/proto/order;order";
enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}
enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_IOC = 3;
  ORDER_TYPE_FOK = 4;
}
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_ACCEPTED = 2;
  ORDER_STATUS_PARTIALLY_FILLED = 3;
  ORDER_STATUS_FILLED = 4;
  ORDER_STATUS_CANCELLED = 5;
  ORDER_STATUS_REJECTED = 6;
  ORDER_STATUS_EXPIRED = 7;
}
enum RejectReason {
  REJECT_REASON_NONE = 0;
  REJECT_REASON_RISK_MAX_ORDER_QTY = 1;
  REJECT_REASON_RISK_MAX_POSITION = 2;
  REJECT_REASON_RISK_MAX_LOSS = 3;
  REJECT_REASON_RISK_KILL_SWITCH = 4;
  REJECT_REASON_RISK_PRICE_COLLAR = 5;
  REJECT_REASON_UNKNOWN_SYMBOL = 6;
  REJECT_REASON_INVALID_PRICE = 7;
  REJECT_REASON_INVALID_QTY = 8;
}
message Order {
  uint64 order_id = 1;
  uint32 price = 2;
  uint32 quantity = 3;
  uint32 filled_qty = 4;
  uint32 client_id = 5;
  uint64 timestamp = 6;
  uint64 sequence = 7;
  uint32 symbol_id = 8;
  OrderSide side = 9;
  OrderType type = 10;
  OrderStatus status = 11;
  RejectReason reject_reason = 12;
}
message SubmitOrderRequest {
  Order order = 1;
}
message SubmitOrderResponse {
  bool success = 1;
  Order order = 2;
  string error_message = 3;
}
message CancelOrderRequest {
  uint64 order_id = 1;
  uint32 client_id = 2;
  uint32 symbol_id = 3;
}
message CancelOrderResponse {
  bool success = 1;
  string error_message = 3;
}
service OrderService {
  rpc SubmitOrder (SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc CancelOrder (CancelOrderRequest) returns (CancelOrderResponse);
}
