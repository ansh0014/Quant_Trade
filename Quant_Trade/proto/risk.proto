syntax = "proto3";

package hft.risk.v1;

option go_package = "github.com/anshul/hft/backend/generated/proto/risk;risk";

import "order.proto";

enum RiskCheckResult {
  RISK_CHECK_RESULT_APPROVED = 0;
  RISK_CHECK_RESULT_EXCEEDS_POSITION = 1;
  RISK_CHECK_RESULT_EXCEEDS_LOSS = 2;
  RISK_CHECK_RESULT_EXCEEDS_ORDER_QTY = 3;
}

message ClientLimits {
  uint32 client_id = 1;
  int64 max_position = 2;
  int64 current_position = 3;
  int64 max_loss = 4;
  int64 current_loss = 5;
  uint32 max_order_qty = 6;
}

message Position {
  uint32 client_id = 1;
  uint32 symbol_id = 2;
  int64 net_qty = 3;
  int64 long_qty = 4;
  int64 short_qty = 5;
  int64 realized_pnl = 6;
  int64 unrealized_pnl = 7;
  uint64 avg_cost = 8;
  uint32 avg_price = 9;
}

message CheckOrderRiskRequest {
  hft.order.v1.Order order = 1;
}

message CheckOrderRiskResponse {
  RiskCheckResult result = 1;
  string details = 2;
}

message SetLimitsRequest {
  uint32 client_id = 1;
  int64 max_position = 2;
  int64 max_loss = 3;
}

message SetLimitsResponse {
  bool success = 1;
}

service RiskService {
  rpc CheckOrderRisk (CheckOrderRiskRequest) returns (CheckOrderRiskResponse);
  rpc SetLimits (SetLimitsRequest) returns (SetLimitsResponse);
}
